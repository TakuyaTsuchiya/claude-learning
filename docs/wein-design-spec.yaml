# wein_backstage_ai_school_design_spec.yaml
# スタイル: Modern_Clean_Tech_Trust
# コンセプト: 「信頼性と先進性を兼ね備えた、洗練されたプロフェッショナルデザイン」

全体デザイン設定:
  デザイントーン: "白地をベースに、黒のテキストでコントラストを高め、ブルー・パープルのグラデーションやグレーの背景ブロックで先進性と整理された印象を与えるミニマルなデザイン。"
  配色ルール: "背景色: #FFFFFF / テキスト色: #000000 / アクセント: ブルー〜パープルのグラデーション / 補助色: 薄いグレー (#F2F2F2, #EFEFEF)"
  フォント扱い: "ゴシック体（サンセリフ）を使用。見出しは太字で大きく、本文は可読性の高いウェイトで構成。英語フォントはセリフ体を使用して高級感を出す箇所あり。"
  背景処理: "基本は白無地。表紙や特定の強調スライドでは、右半分に抽象的な建築物や風景の写真を配置し、余白を生かしたレイアウトを採用。"

共通レイアウト・ルール:
  ヘッダー領域: "左上にスライドのカテゴリ（例：活用事例、Notionなど）、右上にロゴ（WEIN/BACKSTAGE Group）を配置。"
  フッター領域: "左下にコピーライト（© WEIN / BACKSTAGE Group）、右下にページ番号を配置。"
  余白とグリッド: "上下左右に十分な余白（マージン）を確保し、コンテンツエリアは中央に整列。要素間は広めのパディングを取り、圧迫感を排除。"

レイアウト・バリエーション:
  - タイプ: "表紙"
    デザイン: "中央揃えでメインタイトルを特大配置。サブタイトルは左揃えまたは中央。背景は白、または右側に象徴的なイメージ画像を配置するスプリットレイアウト。"
  - タイプ: "中扉（チャプター）"
    デザイン: "背景は白または薄いグラデーション。中央に大きく章タイトル、下に英語タイトルを配置し、セクションの切り替わりを明確にする。"
  - タイプ: "詳細（テキスト＋画像）"
    デザイン: "左側にテキスト説明、右側に余白または関連イメージ。箇条書きはシンプルな中黒（・）を使用し、重要事項はグレーの背景ボックスで囲んで強調。"
  - タイプ: "詳細（3カラム/ポイント列挙）"
    デザイン: "3つの要素を横並びに配置。各カラムに見出しと本文を記述し、論理的な並列構造を可視化する。アイコン等の使用も推奨。"
  - タイプ: "グラフ・数値強調"
    デザイン: "数値を特大フォントで強調。円グラフや対比図はモノトーン＋アクセントカラー（黒とグレー）でシンプルに表現し、メッセージを際立たせる。"
  - タイプ: "ロゴ/事例紹介"
    デザイン: "ツールアイコンや企業ロゴをグリッド状に整列配置。各ロゴの下に名称を記載。背景を薄いグレーの角丸ボックスにしてまとまりを出す。"

デザインルール:
  あしらい・装飾: "角丸（Radius）は小さめに設定し、知的でシャープな印象を維持。影（ドロップシャドウ）は極力薄く、フラットに近いデザインとする。"
  画像選定基準: "具体的すぎる人物写真よりは、抽象的な空間、建築、または高品質なロゴ・アイコンを使用。色は彩度を抑え、全体のトンマナに合わせる。"
  禁止事項: "原色の多用、ポップすぎるフォント、過剰なアニメーション、要素の詰め込みすぎ（ホワイトスペースを殺す配置）。"
