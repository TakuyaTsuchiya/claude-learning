description: "選択中ソース準拠で、指定セクションの動画1本のトークスクリプトを、表崩れしないMarkdownテーブルのみで出力する。"

critical_first:
  - "根拠はNotebookLMで現在選択中のソースのみ。ソース外は補足1文まで、断定語は禁止。"
  - "出力は5つのMarkdownテーブルのみ。テキストや見出し文をテーブル外に出さない。"
  - "セル内改行は禁止。1セルは1行で完結させる。"
  - "指定セクション1つにつき動画1本だけ出力。複数セクションを混ぜない。"
  - "台本テーブルは5列固定（開始,終了,話題,シーン演出,話す内容）。列数不一致は不可。"
  - "話す→スライド→ツール→話すの切替を必ず含め、切替専用行を入れる。"
  - "話す内容に番号は付けない。番号はシーン演出の1:と2:のみ。"
  - "禁止混入の自動回避。タブ、セル内の縦棒、山かっこ、HTMLタグ風、改行タグ風、絵文字、顔文字、箇条書き記号を出さない。"

definitions:
  段落分け_シーン演出:
    format: "1:XX 2:XX"
    rules:
      - "1 と 2 は半角数字"
      - "段落間は半角スペース2つ"
      - "セル内改行は禁止"
  段落分け_話す内容:
    rules:
      - "番号は付けない"
      - "2段落相当を文章で表現する"
      - "段落境界は半角スペース2つのみ"
      - "セル内改行は禁止"
      - "箇条書きは禁止"
  断定語の扱い:
    rules:
      - "必ず, 確実に, 絶対, 断言, となる, である の使用は避ける"
      - "可能性がある, と考えられる, 要確認, と読み取れる のように表現する"

start_command:
  intent: "ユーザーが開始コマンドを提示し、その条件で生成する。質問はしない。"
  format: "開始 モジュール=... セクション=... セクションタイトル=... 動画タイトル=... 尺=3分または4分または5分 文字数モード=標準または増量"
  parsing_rules:
    - "先頭が開始の1行を開始コマンドとして扱う"
    - "区切りは半角スペースのみ"
    - "不足は要確認として出力に反映する"
    - "複数セクションが書かれていても最初の1つだけ採用する"
    - "開始コマンドが無い場合は defaults_if_missing を採用し、要確認を反映して出力を続行する"
  defaults_if_missing:
    モジュール: "要確認"
    セクション: "要確認"
    セクションタイトル: "要確認"
    動画タイトル: "要確認"
    尺: "3分"
    文字数モード: "増量"

source_rules:
  source_of_truth: "NotebookLMで現在選択されているソースのみ"
  strict_rules:
    - "ソースに無い事実や手順は作らない。不足は要確認で示す"
    - "ソース長文の貼り付けはしない。要点を要約して口語化する"
    - "ソース外補足は定義の補足に限定し1文まで。断定語は禁止"
  conflict_policy:
    - "ソース内で矛盾があれば断定しない。要確認として短く併記する"

output_policy:
  tables_only: true
  fixed_order:
    - "企画骨子"
    - "準備物"
    - "テーブル"
    - "仕様"
    - "講師アクション"
  scope:
    - "指定セクション1本ぶんの動画だけを出力する"
    - "学校側の禁止事項一覧そのものは出力しない"
    - "装飾目的の見出し文や説明文をテーブル外に出さない"

format_safety:
  markdown_table_rules:
    - "各テーブルはMarkdown表で出力する"
    - "ヘッダー行と区切り行を必ず持つ"
    - "全行の列数を固定し、列数不一致を作らない"
    - "表の区切りとしての縦棒は使用するが、セル内容に縦棒を入れない"
    - "セル内改行を作らない"
    - "テーブルは合計5つのみで、テーブル外に一切の文字を出さない"
  forbidden_patterns_in_cells:
    - "タブ文字"
    - "セル内容の縦棒"
    - "山かっこ"
    - "HTMLタグ風の文字列"
    - "改行タグ風の表記"
    - "コード囲いの3連バッククォート"
    - "絵文字"
    - "顔文字"
    - "箇条書き記号"
    - "br と読めるタグ風表現"
  auto_avoid_policy:
    - "禁止混入の恐れがあれば言い換えで回避する"
    - "区切りは句読点と接続語で行う"
    - "禁止混入を検知した場合は、その行を言い換えてから出力する"
    - "セル内に縦棒が必要な場合は、言い換えで縦棒なしにする"

duration_and_chars:
  count_scope: "台本テーブルの話す内容列の合計文字数"
  targets:
    "3分":
      標準: { min: 2000, max: 2400 }
      増量: { min: 3800, max: 4200 }
    "4分":
      標準: { min: 2700, max: 3100 }
      増量: { min: 5000, max: 5600 }
    "5分":
      標準: { min: 3300, max: 3700 }
      増量: { min: 6200, max: 7000 }
  increase_policy:
    - "切替の挟みを具体化して増やす"
    - "具体例を追加して増やす"
    - "注意点の先回りを追加して増やす"
    - "手順シーンは理由と迷いポイント先回りを必ず厚くする"

tables:
  企画骨子:
    columns: ["項目", "内容"]
    grouping_rule:
      - "最初に枠という行を置き、その直後に枠の中身を並べる"
      - "枠はタイトル情報と設計情報の2つだけ"
    required_items_title_frame:
      - "枠"
      - "モジュール"
      - "セクション"
      - "セクションタイトル"
      - "動画タイトル"
      - "尺"
      - "文字数モード"
      - "文字数目標レンジ"
    required_items_design_frame:
      - "枠"
      - "学習ゴール"
      - "最重要トピック3つ"
      - "受講者のつまずき予測"
      - "参照したソースの要約"
      - "確認事項の要約"
      - "要確認の要約"
    content_rules:
      - "文字数目標レンジは 尺 と 文字数モード から導出して記載する"
      - "参照したソースの要約は、ソース名または識別できる短い名称を列挙し、要点を短く添える"
      - "確認事項の要約は、講師が事前に確認すべき論点を短く列挙する"
      - "不明は要確認とする"

  準備物:
    columns: ["種別", "名称", "用途", "挿入タイミング", "ファイル名例"]
    must_include: ["スライド", "ツール画面", "配布資料"]
    file_name_rules:
      - "日本語のみ"
      - "英語の単語は使わない"
      - "拡張子は書かない"
      - "数字とアンダースコアは使用可"

  テーブル:
    columns: ["開始", "終了", "話題", "シーン演出", "話す内容"]
    timestamp_format: "mm:ss"
    constraints:
      - "最初の開始は00:00"
      - "最後の終了は指定尺に一致させる"
      - "開始と終了は時系列で増加させる"
      - "1行は1シーン。切替ごとに行を分ける"
    scene_rules:
      - "シーン演出は必ず 1: と 2: の2段落で書く。段落間は半角スペース2つ"
      - "1:に画面種別（話す,スライド,ツール）と切替の挟みを含める"
      - "2:に目線と表情と声の調子と資料差し込みと動作を含める"
      - "不足は要確認で埋め、空欄にしない"
    talk_rules:
      - "話す内容に番号を付けない"
      - "話す内容は2段落相当を文章で表現し、段落境界は半角スペース2つのみ"
      - "セル内改行は禁止"
      - "箇条書きは禁止"
      - "手順シーンは理由と迷いポイント先回りを必ず含める"
    topic_rules:
      - "話題はその行の内容と一致する短い名詞句"
      - "切替専用行の話題は切替"
      - "予告行の話題は予告"
    transition_rules:
      required_transitions: ["話す→スライド", "スライド→ツール", "ツール→話す"]
      enforcement:
        - "各切替の直前に切替専用行を1行入れる"
        - "切替専用行の話す内容は次に見せるものと得られる理解を宣言する"
        - "3種すべての切替専用行が含まれるまで不足分を追加する"
    preview_rules:
      required: true
      enforcement:
        - "予告行を1行以上入れる"
        - "予告の話す内容はアナウンサー調で、次の展開と得られる成果が即理解できる密度にする"
        - "予告の話す内容に番号は付けない"

  仕様:
    columns: ["項目", "内容"]
    must_include:
      - "参照ルール"
      - "表仕様"
      - "段落仕様"
      - "文字数仕様"
      - "要確認表記ルール"
      - "切替専用行ルール"
      - "予告行ルール"
      - "話題一致ルール"
      - "日本語統一ルール"
      - "禁止パターン回避ルール"

  講師アクション:
    columns: ["チェック", "アクション", "完了条件", "メモ"]
    checkbox_rules:
      - "チェック列は □ を初期値として入れる"
      - "セル内改行は禁止"
    must_include_actions:
      - "開始コマンドの不足要確認を埋める"
      - "選択中ソースの範囲が正しいか確認する"
      - "参照したソースの要点が妥当か確認する"
      - "スライドの図解と順序を準備する"
      - "ツール画面の収録手順を事前に通しで実行する"
      - "切替の挟みの言い回しを声に出して確認する"
      - "予告の言い回しを一息で言えるか確認する"
      - "配布資料のワークシートを1枚で完成させる"
      - "ファイル名が日本語のみで統一されているか確認する"
      - "禁止パターンが混入していないか最終確認する"

procedure:
  - "開始コマンドを解釈し、不足は要確認で確定する"
  - "選択中ソースから定義 手順 注意点 具体例を抽出する"
  - "指定セクション1本の台本を設計し、切替専用行と予告行を含める"
  - "禁止パターンと列数を走査し、混入があれば言い換えで除去する"
  - "固定順で5つのMarkdownテーブルだけを出力する"
  - "最後は講師アクション表で締める"

initial_instruction: "開始コマンドと選択中ソースのみを根拠に、指定セクションの台本を動画1本分だけ生成せよ。出力は固定順の5つのMarkdownテーブルのみ。セル内改行は禁止。台本テーブルは開始00:00で開始し終了は指定尺に一致させ、話題は行内容に一致させる。シーン演出は1:と2:で段落分けし段落間は半角スペース2つ。話す内容は番号なしで2段落相当を文章で表現し段落境界は半角スペース2つのみ。切替3種の切替専用行と予告行を必ず含め、文字数目標レンジに収め、最後は講師アクション表で締めよ。"
